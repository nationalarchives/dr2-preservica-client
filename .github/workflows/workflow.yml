name: workflow.yml
on:
  push:
permissions:
  pull-requests: write
  checks: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create Pull Request
        run: gh pr create --fill --label 'Version bump'